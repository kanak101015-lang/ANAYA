<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happiest 20th Birthday</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #0f3460 100%);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }

        h1 {
            font-size: 4rem;
            margin: 50px 0 30px 0;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-20px); }
            60% { transform: translateY(-10px); }
        }

        .birthday-text {
            font-size: 2rem;
            margin-bottom: 50px;
            opacity: 0.9;
        }

        .btn {
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            margin: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(255,107,107,0.4);
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(255,107,107,0.6);
        }

        .btn:active {
            transform: translateY(-2px);
        }

        /* Page 2 - Sorry 1000 times */
        .sorry-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .sorry-text {
            font-size: 1.2rem;
            margin: 20px 0;
            animation: fadeInOut 1s infinite;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* Page 3 - Gift */
        .gift-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .gift-text {
            font-size: 2.5rem;
            margin-bottom: 30px;
            color: #feca57;
        }

        /* Page 4 - YouTube */
        .video-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .youtube-frame {
            width: 80%;
            max-width: 800px;
            height: 450px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        /* Page 5 - Pinterest Images */
        .images-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 50px;
        }

        .image-card {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .image-card:hover {
            transform: translateY(-10px);
            background: rgba(255,255,255,0.2);
        }

        .image-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 15px;
            margin-bottom: 15px;
        }

        .back-btn {
            background: linear-gradient(45deg, #667eea 0%, #764ba2 100%);
            margin-top: 30px;
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            .birthday-text { font-size: 1.5rem; }
            .btn { padding: 15px 30px; font-size: 1.2rem; }
        }
    </style>
</head>
<body>

<!-- Page 1: Main Birthday Page -->
<div id="page1" class="container">
    <h1>?? HAPPIEST 20TH ??</h1>
    <p class="birthday-text">BIRTHDAY BOY</p>
    <button class="btn" onclick="goToPage2()">EXPLORE MORE</button>
</div>

<!-- Page 2: Sorry 1000 times -->
<div id="page2" class="sorry-container" style="display: none;">
    <h1 style="font-size: 3rem; margin-bottom: 30px;">?? SORRY TIME ??</h1>
    <div id="sorryList" style="max-height: 60vh; overflow-y: auto; text-align: left; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 15px; width: 80%;"></div>
    <button class="btn" onclick="goToPage3()" style="margin-top: 30px;">YOUR GIFT ??</button>
</div>

<!-- Page 3: Gift Page -->
<div id="page3" class="gift-container" style="display: none;">
    <h1 class="gift-text">?? YOUR GIFT IS READY! ??</h1>
    <p style="font-size: 1.5rem; margin-bottom: 50px;">Click below to see your special surprises!</p>
    <button class="btn" onclick="goToPage4()">?? MUSIC TIME ??</button>
    <button class="btn back-btn" onclick="goToPage1()">? BACK</button>
</div>

<!-- Page 4: YouTube Video -->
<div id="page4" class="video-container" style="display: none;">
    <h1 style="font-size: 2.5rem; margin-bottom: 30px;">?? YOUR SPECIAL SONG ??</h1>
    <iframe class="youtube-frame" src="https://www.youtube.com/embed/WKbwopSXLWU" 
            title="YouTube video player" frameborder="0" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen></iframe>
    <button class="btn back-btn" onclick="goToPage5()">?? MORE GIFTS</button>
</div>

<!-- Page 5: Pinterest Images + Pexels -->
<div id="page5" class="container" style="display: none;">
    <h1 style="font-size: 3rem; margin: 50px 0 30px 0;">?? SPECIAL IMAGES FOR YOU ??</h1>
    <div class="images-grid">
        <div class="image-card">
            <a href="https://in.pinterest.com/pin/96757091982906986/" target="_blank">
                <img src="https://i.pinimg.com/736x/xx/xx/xx/96757091982906986.jpg" alt="Pinterest Image 1" 
                     onerror="this.src='https://via.placeholder.com/300x250/1e3c72/ffffff?text=Pinterest+1'">
                <h3>Pinterest Gift 1</h3>
            </a>
        </div>
        <div class="image-card">
            <a href="https://in.pinterest.com/pin/596164069424832028/" target="_blank">
                <img src="https://i.pinimg.com/736x/yy/yy/yy/596164069424832028.jpg" alt="Pinterest Image 2"
                     onerror="this.src='https://via.placeholder.com/300x250/1e3c72/ffffff?text=Pinterest+2'">
                <h3>Pinterest Gift 2</h3>
            </a>
        </div>
        <div class="image-card">
            <a href="https://www.pexels.com/photo/blue-bmw-sedan-near-green-lawn-grass-170811/" target="_blank">
                <img src="https://images.pexels.com/photos/170811/pexels-photo-170811.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=1" 
                     alt="Blue BMW">
                <h3>??? Cool Blue BMW</h3>
            </a>
        </div>
    </div>
    <button class="btn back-btn" onclick="goToPage1()" style="margin-top: 50px;">?? HOME</button>
</div>

<script>
    function showPage(pageId) {
        // Hide all pages
        const pages = ['page1', 'page2', 'page3', 'page4', 'page5'];
        pages.forEach(id => {
            document.getElementById(id).style.display = 'none';
        });
        // Show selected page
        document.getElementById(pageId).style.display = 'block';
    }

    function goToPage1() { showPage('page1'); }
    function goToPage2() { 
        showPage('page2'); 
        generateSorryList(); 
    }
    function goToPage3() { showPage('page3'); }
    function goToPage4() { showPage('page4'); }
    function goToPage5() { showPage('page5'); }

    function generateSorryList() {
        const container = document.getElementById('sorryList');
        container.innerHTML = '';
        for(let i = 0; i < 1000; i++) {
            const div = document.createElement('div');
            div.className = 'sorry-text';
            div.textContent = `Sorry ${i + 1} ??`;
            div.style.animationDelay = `${Math.random() * 0.5}s`;
            container.appendChild(div);
        }
    }

    // Initialize first page
    showPage('page1');
</script>
</body>
</html>
